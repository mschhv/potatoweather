            background-color: #1c1c1e;

            overflow-y: auto;

            z-index: 1010;
        }

            box-sizing: border-box;
            padding: 20px;

            flex-direction: column;

            border-radius: 8px; 
            padding: 15px; 
        }

            font-size: 11px;

            color: #8e8e93; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
            font-weight: bold; 
        }

            background-color: #2c2c2e;
            color: #ccc;
            border: 1px solid #48484a;
            padding: 12px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .nav-btn:hover { background-color: #3a3a3c; color: #fff; }
        .nav-btn.active {
            background-color: #4DA8DA;

            box-shadow: 0 4px 12px rgba(77, 168, 218, 0.25);
        }

            font-size: 11px;
            background-color: rgba(255,255,255,0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        }

        #live-clock {

            font-weight: bold;

            text-align: center; 
            text-shadow: 0 0 10px rgba(77, 168, 218, 0.3);
            letter-spacing: 1px;
        }
        
        .hko-btn { 
            display: block; 
            background-color: #2c2c2e; 
            color: #ffffff; 
            text-align: center; 
            padding: 10px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            border: 1px solid #48484a;

        }

        function getWindArrow(dirStr) {
            if (!dirStr || dirStr === "N/A" || dirStr.toLowerCase().includes("variable") || dirStr.includes("微風")) return "•";
            const cleanDir = dirStr.trim();
            if (!isNaN(cleanDir) && cleanDir !== "") {
                const degrees = parseFloat(cleanDir);
                const index = Math.round(degrees / 22.5) % 16;
                const directions = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
                return compassArrows[directions[index]] || "•";
            }
            return compassArrows[cleanDir] || "•";
        }

        function cleanStationName(name) {
            return name ? name.replace(/"/g, '').trim() : "";

        function calcHeatIndex(tc, rh, windMS) {
            const e = (rh / 100) * 6.105 * Math.exp((17.27 * tc) / (237.7 + tc));
            const ws = windMS || 0;
            const apparentTemp = tc + (0.33 * e) - (0.70 * ws) - 4.00;
            return parseFloat(apparentTemp.toFixed(1));
        }

        function getUnifiedHeatColor(value) {
            if (value >= 40.0) return '#800000'; 
            if (value >= 35.0) return '#ef4444'; 
            if (value >= 30.0) return '#f97316'; 
            if (value >= 25.0) return '#eab308'; 
            if (value >= 15.0) return '#22c55e'; 
            if (value >= 10.0) return '#f97316'; 
            if (value < 10.0)  return '#ef4444'; 
        }

            if (value >= 20.0) return "🌤️ 全年極少數不需要開冷氣的黃金日子！";
            if (value >= 15.0) return "🧥 時裝週：街上開始出現羽絨外套。";
            if (value >= 10.0) return "🥶 香港西伯利亞寒流：室內冷氣自動變成暖氣。";
            return "🏔️ 大帽山警告：如果你不覺得凍，你不是香港人。";
        }

        function calculateWBGT(T, RH, windMS) {
            let Tw = T * Math.atan(0.151977 * Math.sqrt(RH + 8.313659)) + 
                     Math.atan(T + RH) - Math.atan(RH - 1.676331) + 
                     0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH) - 4.686035;
            
            const solarRad = 650; 
            let windFactor = Math.max(0.5, windMS);
            let Tg_est = T + (0.015 * solarRad) - (0.45 * Math.sqrt(windFactor) * (T - 20));
            let Tg = Math.max(T, Tg_est); 

            let wbgt = (0.7 * Tw) + (0.2 * Tg) + (0.1 * T);

            return {
                wbgt: parseFloat(wbgt.toFixed(1)),
                Tw: parseFloat(Tw.toFixed(1)),
                Tg: parseFloat(Tg.toFixed(1))
            };
        }

        function getTempColor(t) {
            if (t >= 33) return '#ef4444';
            if (t >= 30) return '#f97316';
            if (t >= 26) return '#eab308';
            if (t >= 20) return '#22c55e';
            return '#38bdf8';
        }

        function getWindColor(kmh) {
            if (kmh >= 89) return '#9202fd';
            if (kmh >= 62) return '#ef4444';
            if (kmh >= 50) return '#f97316';
            if (kmh >= 19) return '#eab308';
            if (kmh >= 1) return '#22c55e';
            return '#6b7280';
        }

        function getRainColor(mm) {
            if (mm >= 30) return '#ef4444';
            if (mm >= 10) return '#38bdf8';
            if (mm > 0) return '#1d4ed8';
            return '#374151';
        }

        function getWarningStyle(code, name) {
            let bg = '#3a3a3c'; let text = '#ffffff'; let border = '#48484a';
            const cleanName = name.toLowerCase();
            const cleanCode = code.toUpperCase();
            
            if (cleanName.includes('紅') || cleanCode.includes('R')) {
                bg = 'rgba(239, 68, 68, 0.15)'; text = '#ef4444'; border = '#ef4444';
            } else if (cleanName.includes('黑')) {
                bg = 'rgba(0, 0, 0, 0.5)'; text = '#ffffff'; border = '#ffffff';
            } else if (cleanName.includes('黃') || cleanName.includes('雷暴') || cleanName.includes('季候風')) {
                bg = 'rgba(234, 179, 8, 0.15)'; text = '#eab308'; border = '#eab308';
            } else if (cleanName.includes('酷熱')) {
                bg = 'rgba(249, 115, 22, 0.15)'; text = '#f97316'; border = '#f97316';
            } else if (cleanName.includes('寒冷') || cleanName.includes('霜凍')) {
                bg = 'rgba(56, 189, 248, 0.15)'; text = '#38bdf8'; border = '#38bdf8';
            } else if (cleanName.includes('風球') || cleanName.includes('熱帶氣旋')) {
                bg = 'rgba(239, 68, 68, 0.15)'; text = '#ef4444'; border = '#ef4444';
            }
            return `background-color:${bg}; color:${text}; border:1px solid ${border}; padding:8px 10px; border-radius:6px; font-size:12px; font-weight:bold; display:flex; flex-direction:column; gap:2px;`;
        }

        function switchView(targetView) {
            currentView = targetView;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${targetView}`).classList.add('active');
            if (cachedStationData) renderMapLayers(cachedStationData);
            if (window.innerWidth <= 1440) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function populateForecastPanel(fndData, flwData) {
            const outlookContainer = document.getElementById('local-outlook-container');
            const gridContainer = document.getElementById('forecast-grid-container');

            if (outlookContainer && flwData) {
                let text = flwData.forecastDesc || '暫無短期預報。';
                if (flwData.outlook) {
                    text += `<div style="margin-top:8px; padding-top:8px; border-top:1px dashed #444; color:#4DA8DA; font-size:12px;"><b>天氣展望:</b> ${flwData.outlook}</div>`;
                }
                outlookContainer.innerHTML = text;
            }

            if (gridContainer && fndData?.weatherForecast) {
                let html = '';
                const upcoming7Days = fndData.weatherForecast.slice(0, 7);
                upcoming7Days.forEach(day => {
                    let rawDate = day.forecastDate || '';
                    let displayDate = rawDate;
                    if (rawDate.length === 8) {
                        displayDate = `${rawDate.substring(4,6)}/${rawDate.substring(6,8)}`;
                    }

                    const minT = day.forecastMintemp ? (typeof day.forecastMintemp === 'object' ? day.forecastMintemp.value : day.forecastMintemp) : null;
                    const maxT = day.forecastMaxtemp ? (typeof day.forecastMaxtemp === 'object' ? day.forecastMaxtemp.value : day.forecastMaxtemp) : null;
                    const minRh = day.forecastMinrh ? (typeof day.forecastMinrh === 'object' ? day.forecastMinrh.value : day.forecastMinrh) : null;
                    const maxRh = day.forecastMaxrh ? (typeof day.forecastMaxrh === 'object' ? day.forecastMaxrh.value : day.forecastMaxrh) : null;
                    const iconNum = day.ForecastIcon;
                    const iconUrl = iconNum ? `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconNum}.png` : '';

                    html += `
                    <div style="background-color: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3a3c; padding-bottom: 3px;">
                            <span style="font-weight: 600; color: #4DA8DA; font-size: 13px;">${day.week} (${displayDate})</span>
                            ${iconUrl ? `<img src="${iconUrl}" style="width: 22px; height: 22px;" alt="wx-icon">` : ''}
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 2px;">
                            <span>儲🌡️ <b style="color: #ef4444;">${maxT}°C</b> / <b style="color: #38bdf8;">${minT}°C</b></span>
                            <span>💧 <b>${minRh}-${maxRh}%</b></span>
                        </div>
                        <div style="font-size: 11px; color: #bbb; line-height: 1.3; margin-top: 2px;">${day.forecastWeather}</div>
                    </div>`;
                });
                gridContainer.innerHTML = html;
            }
        }

        async function initAndFetchWeather() {
            const timestampEl = document.getElementById('timestamp');
            if (!timestampEl) return;
            
            try {
                if (typeof L === 'undefined') throw new Error("Leaflet 地圖引擎加載失敗。");

                if (!map) {
                    map = L.map('map').setView([22.36, 114.14], 11);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20
                    }).addTo(map);
                }

                timestampEl.style.color = "#eab308";
                timestampEl.innerHTML = "🔄 正在從香港天文台獲取最新實時氣象數據...";

                const proxyUrl = 'https://hko-wind-proxy.mschhv.workers.dev/'; 

                let jsonData = null;
                let windCsvText = "";
                let humCsvText = "";
                let warningsData = null;
                let forecastData = null;
                let localForecastData = null;

                const stationData = {};
                for (const place in stationCoords) {
                    stationData[place] = {
                        temp: null, humidity: null, windSpeedMS: null, windGustKmh: 0, windDirection: "N/A", rainfallMM: 0,
                        hasLocalTemp: false, hasLocalWind: false, hasLocalHumidity: false,
                        isWindFallback: false, isWindBaseline: false, isTempFallback: false
                    };
                }

                try {
                    const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                    if (res.ok) jsonData = await res.json();
                } catch (e) { console.error("Error fetching core JSON", e); }

                try {
                    const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                    if (res.ok) warningsData = await res.json();
                } catch (e) { console.error("Error fetching warnings summary", e); }

                try {
                    const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                    if (res.ok) forecastData = await res.json();
                } catch (e) { console.error("Error fetching 9-day forecast json", e); }

                try {
                    const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc');
                    if (res.ok) localForecastData = await res.json();
                } catch (e) { console.error("Error fetching local outlook text", e); }

                try {
                    const res = await fetch(`${proxyUrl}?file=latest_10min_wind.csv`);
                    if (res.ok) windCsvText = await res.text();
                } catch (e) { console.error("Error fetching wind CSV via proxy", e); }

                try {
                    const res = await fetch(`${proxyUrl}?file=latest_1min_humidity.csv`);
                    if (res.ok) humCsvText = await res.text();
                } catch (e) { console.error("Error fetching humidity CSV", e); }

                let territoryDefaultTemp = 25.0;
                let territoryDefaultHum = 75;

                if (jsonData?.temperature?.data) {
                    jsonData.temperature.data.forEach(t => { 
                        const rawName = cleanStationName(t.place);
                        const name = jsonNameMap[rawName] || rawName;
                        const rawVal = parseFloat(t.value);
                        if (name === "Hong Kong Observatory") territoryDefaultTemp = rawVal;
                        if (stationData[name]) {
                            stationData[name].temp = rawVal;
                            stationData[name].hasLocalTemp = true;
                        }
                    });
                }
                
                if (jsonData?.humidity?.data) {
                    const hkoHumObj = jsonData.humidity.data.find(h => jsonNameMap[cleanStationName(h.place)] === "Hong Kong Observatory");
                    if (hkoHumObj) territoryDefaultHum = hkoHumObj.value;
                    jsonData.humidity.data.forEach(h => {
                        const rawName = cleanStationName(h.place);
                        const name = jsonNameMap[rawName] || rawName;
                        if (stationData[name]) {
                            stationData[name].humidity = h.value;
                            stationData[name].hasLocalHumidity = true;
                        }
                    });
                }

                if (jsonData?.rainfall?.data) {
                    jsonData.rainfall.data.forEach(dist => {
                        const rawDistrictName = cleanStationName(dist.place);
                        const districtName = jsonDistrictMap[rawDistrictName] || rawDistrictName;
                        const rainValue = parseFloat(dist.max);
                        if (!isNaN(rainValue)) {
                            for (const [station, targetDistrict] of Object.entries(stationRainDistrictMap)) {
                                if (targetDistrict.toLowerCase() === districtName.toLowerCase()) {
                                    stationData[station].rainfallMM = rainValue;
                                }
                            }
                        }
                    });
                }

                if (humCsvText) {
                    humCsvText.split('\n').slice(1).forEach(row => {
                        const cols = row.split(',');
                        if (cols.length >= 3) {
                            let csvPlace = cleanStationName(cols[1]);
                            if (csvPlace === "Hong Kong International Airport") csvPlace = "Chek Lap Kok";
                            if (stationData[csvPlace]) {
                                const humVal = parseInt(cols[2].replace(/"/g, '').trim());
                                if (!isNaN(humVal)) {
                                    stationData[csvPlace].humidity = humVal;
                                    stationData[csvPlace].hasLocalHumidity = true;
                                }
                            }
                        }
                    });
                }

                if (windCsvText) {
                    windCsvText.split('\n').slice(1).forEach(row => {
                        const cols = row.split(',');
                        if (cols.length >= 4) {
                            const csvPlace = cleanStationName(cols[1]);
                            const dirStr = cols[2].replace(/"/g, '').trim();
                            const speedStr = cols[3].replace(/"/g, '').trim();
                            const gustStr = cols[4] ? cols[4].replace(/"/g, '').trim() : "";

                            if (stationData[csvPlace] && speedStr !== "N/A" && speedStr !== "") {
                                const speedKmh = parseFloat(speedStr);
                                if (!isNaN(speedKmh)) {
                                    stationData[csvPlace].windSpeedMS = speedKmh / 3.6;
                                    stationData[csvPlace].windDirection = dirStr || "N/A";
                                    stationData[csvPlace].hasLocalWind = true;
                                }
                                if (gustStr && gustStr !== "N/A" && gustStr !== "") {
                                    const gustKmh = parseFloat(gustStr);
                                    if (!isNaN(gustKmh)) stationData[csvPlace].windGustKmh = gustKmh;
                                }
                            }
                        }
                    });
                }

                for (const [place, data] of Object.entries(stationData)) {
                    if (!data.hasLocalTemp) {
                        const fallbackName = tempFallbackMap[place];
                        if (fallbackName && stationData[fallbackName] && stationData[fallbackName].hasLocalTemp) {
                            data.temp = stationData[fallbackName].temp;
                            data.isTempFallback = true;
                        } else {
                            data.temp = territoryDefaultTemp;
                        }
                    }
                    if (!data.hasLocalWind) {
                        const fallbackName = windFallbackMap[place];
                        if (fallbackName && stationData[fallbackName] && stationData[fallbackName].hasLocalWind) {
                            data.windSpeedMS = stationData[fallbackName].windSpeedMS;
                            data.windDirection = stationData[fallbackName].windDirection;
                            data.windGustKmh = stationData[fallbackName].windGustKmh;
                            data.isWindFallback = true;
                        } else {
                            data.windSpeedMS = 1.0; 
                            data.isWindBaseline = true;
                        }
                    }
                    if (!data.hasLocalHumidity) data.humidity = territoryDefaultHum;
                }

                const warningsContainer = document.getElementById('warnings-container');
                if (warningsContainer) {
                    if (!warningsData || Object.keys(warningsData).length === 0) {
                        warningsContainer.innerHTML = `<span style="color:#22c55e; font-size:13px; font-weight:600; display:flex; align-items:center; gap:5px;">✅ 當前無生效天氣警告</span>`;
                    } else {
                        let warningsHTML = '';
                        let activeCount = 0;
                        Object.values(warningsData).forEach(w => {
                            if (w.status === 'in force' || w.actionCode === 'ISSUE' || w.actionCode === 'REISSUE') {
                                activeCount++;
                                const alertStyle = getWarningStyle(w.code || '', w.name || '');
                                let timeStr = '';
                                if (w.issueTime) {
                                    try {
                                        const issueDate = new Date(w.issueTime);
                                        timeStr = `<span style="font-size:10px; font-weight:normal; opacity:0.8; margin-top:2px;">發出時間: ${issueDate.toLocaleTimeString('en-HK', {hour:'2-digit', minute:'2-digit', hour12:false})}</span>`;
                                    } catch(err){}
                                }
                                warningsHTML += `<div style="${alertStyle}"><div>${w.name}</div>${timeStr}</div>`;
                            }
                        });
                        warningsContainer.innerHTML = activeCount > 0 ? warningsHTML : `<span style="color:#22c55e; font-size:13px; font-weight:600; display:flex; align-items:center; gap:5px;">✅ 當前無生效天氣警告</span>`;
                    }
                }

                const uvContainer = document.getElementById('uv-container');
                if (uvContainer) {
                    if (jsonData?.uvindex?.data && jsonData.uvindex.data.length > 0) {
                        const uvNode = jsonData.uvindex.data[0];
                        const uvValue = parseFloat(uvNode.value);
                        const uvDesc = uvNode.desc || "曝曬級別";
                        const uvPlace = uvNode.place || "京士柏";
                        
                        let uvColor = '#22c55e'; 
                        if (uvValue >= 11) uvColor = '#bc00dd'; 
                        else if (uvValue >= 8) uvColor = '#ef4444'; 
                        else if (uvValue >= 6) uvColor = '#f97316'; 
                        else if (uvValue >= 3) uvColor = '#eab308'; 

                        uvContainer.innerHTML = `
                            <div style="display: flex; align-items: center; justify-content: space-between; background-color: #2c2c2e; border: 1px solid #3a3a3c; padding: 10px; border-radius: 6px;">
                                <div>
                                    <div style="font-size: 22px; font-weight: bold; color: ${uvColor};">${uvValue}</div>
                                    <div style="font-size: 11px; color: #aaa; text-transform: capitalize; font-weight: 600; margin-top: 2px;">強度: ${uvDesc}</div>
                                </div>
                                <div style="font-size: 10px; color: #8e8e93; text-align: right; line-height: 1.3;">
                                    測量地點:<br><b style="color: #ccc;">${uvPlace}</b>
                                </div>
                            </div>
                        `;
                    } else {
                        uvContainer.innerHTML = `<span style="color: #8e8e93; font-size: 13px; font-style: italic;">🌙 夜間無紫外線輻射效應</span>`;
                    }
                }

                cachedStationData = stationData;
                renderMapLayers(stationData);
                populateForecastPanel(forecastData, localForecastData);

                const now = new Date();
                timestampEl.style.color = "#22c55e";
                timestampEl.innerHTML = `✅ 實時數據更新於: ${now.toLocaleDateString('zh-HK', {year:'numeric', month:'long', day:'numeric'})} ${now.toLocaleTimeString('zh-HK', {hour12:false})}`;

            } catch (error) {
                console.error("Layout initialization failure:", error);
                timestampEl.style.color = "#ef4444";
                timestampEl.innerHTML = `❌ 錯誤: ${error.message}`;
            }
        }



async function fetchDailyExtremesZH() {
    try {
        const response = await fetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc");
        const data = await response.json();
        
        // 抓取九天天氣預報當中的第一筆數據（即為今日預估極值）
        if (data?.weatherForecast && data.weatherForecast.length > 0) {
            const todayForecast = data.weatherForecast[0];
            const maxVal = todayForecast.forecastMaxtemp?.value;
            const minVal = todayForecast.forecastMintemp?.value;

            if (maxVal !== undefined) document.getElementById('hko-max-temp').textContent = `${maxVal}°C`;
            if (minVal !== undefined) document.getElementById('hko-min-temp').textContent = `${minVal}°C`;
        }
    } catch (error) {
        console.error("獲取天文台本日極值失敗:", error);
    }
}

// 頁面載入時自動執行
fetchDailyExtremesZH();


        function renderMapLayers(stationData) {
            if (!map) return;

            map.eachLayer(layer => {
                if (layer instanceof L.Marker) map.removeLayer(layer);
            });

            for (const [place, metrics] of Object.entries(stationData)) {
                if (!stationCoords[place]) continue;

                const T = metrics.temp;
                const RH = metrics.humidity;
                const windSpeedMS = metrics.windSpeedMS;
                const windSpeedKmh = windSpeedMS * 3.6;
                const gustsKmh = metrics.windGustKmh;
                const dir = metrics.windDirection;
                const rain = metrics.rainfallMM;

                const hiVal = calcHeatIndex(T, RH, windSpeedMS);
                const wbgtResults = calculateWBGT(T, RH, windSpeedMS);
                
                let displayHTML = "";
                let badgeColor = "#22c55e";

                if (currentView === 'hi') {
                    displayHTML = `${hiVal.toFixed(1)}°C`;
                    badgeColor = getUnifiedHeatColor(hiVal);
                } else if (currentView === 'wbgt') {
                    displayHTML = `${wbgtResults.wbgt.toFixed(1)}°C`;
                    badgeColor = getUnifiedHeatColor(hiVal);
                } else if (currentView === 'temp') {
                    displayHTML = `${T.toFixed(1)}°C`;
                    badgeColor = getUnifiedHeatColor(hiVal);
                } else if (currentView === 'wind') {
                    const arrow = getWindArrow(dir);
                    displayHTML = `<div>${windSpeedKmh.toFixed(0)}<span style="font-size:9px; font-weight:normal; margin-left:1px;">km/h</span></div>
                    <div style="font-size:16px; margin-top:2px; color:#4DA8DA; font-weight:bold;">${arrow}</div>`;
                    badgeColor = getWindColor(windSpeedKmh);
                 } else if (currentView === 'gust') {
                    displayHTML = `<div style="line-height: 1.4;">${gustsKmh > 0 ? gustsKmh.toFixed(0) : '0'}<span style="font-size:9px; font-weight:normal; margin-left:1px;">km/h</span></div>`;
                    badgeColor = getWindColor(gustsKmh);
                } else if (currentView === 'rain') {
                    displayHTML = `${rain.toFixed(1)} mm`;
                    badgeColor = getRainColor(rain);
                }

                const icon = L.divIcon({
                    className: 'custom-wbgt-wrapper-element',
                    html: `<div class="wbgt-badge" style="border: 2px solid ${badgeColor};">${displayHTML}</div>`,
                    iconSize: null, 
                    iconAnchor: [30, 15]
                });

                const marker = L.marker(stationCoords[place], { icon: icon }).addTo(map);

                let notes = [];
                if (metrics.isTempFallback) notes.push("已套用鄰近測站溫度修正");
                if (metrics.isWindFallback) notes.push("風速數據由鄰近風向標代傳");
                if (metrics.isWindBaseline) notes.push("已套用對流風力基本值修正");
                if (!metrics.hasLocalHumidity) notes.push("已套用全港平均相對濕度值");

                const notesHTML = notes.length > 0 ? `<div class="warning-text">* ${notes.join('<br>* ')}</div>` : '';
                const displayStationName = stationNamesZh[place] || place;

                marker.bindPopup(`
                    <div class="popup-title">${displayStationName}</div>
                    <div class="popup-data" style="${currentView === 'temp' ? 'font-weight:bold; color:#4DA8DA;' : ''}">🌡️ 環境溫度 (T): <b>${T.toFixed(1)}°C</b></div>
                    <div class="popup-data">💧 相對濕度: <b>${RH}%</b></div>
                    <div class="popup-data" style="${currentView === 'wind' ? 'font-weight:bold; color:#4DA8DA;' : ''}">💨 實時風速: <b>${windSpeedKmh.toFixed(1)} km/h (${dir})</b></div>
                    <div class="popup-data" style="${currentView === 'gust' ? 'font-weight:bold; color:#4DA8DA;' : ''}">🌪️ 最高陣風: <b>${gustsKmh > 0 ? gustsKmh.toFixed(1) + ' km/h' : '無數據'}</b></div>
                    <div class="popup-data" style="${currentView === 'rain' ? 'font-weight:bold; color:#4DA8DA;' : ''}">🌧️ 每小時降雨: <b>${rain.toFixed(1)} mm</b></div>
                    <div class="popup-divider"></div>
                    <div class="popup-data">🧪 濕球溫度 (Tw): <b>${wbgtResults.Tw.toFixed(1)}°C</b></div>
                    <div class="popup-data" style="color: #bbb;">☀️ 估算黑球 (Tg): <b>${wbgtResults.Tg.toFixed(1)}°C</b></div>
                    <div class="popup-divider"></div>
                    <div class="popup-data" style="font-size: 14px; ${currentView === 'hi' ? 'font-weight:bold; text-decoration: underline;' : ''} color:${getUnifiedHeatColor(hiVal)};">✨ 體感溫度 (Feels Like): <b>${hiVal.toFixed(1)}°C</b></div>
                    <div class="popup-data" style="font-size: 14px; ${currentView === 'wbgt' ? 'font-weight:bold; text-decoration: underline;' : ''} color:${getUnifiedHeatColor(hiVal)};">🎯 戶外暑熱指數 WBGT: <b>${wbgtResults.wbgt.toFixed(1)}°C</b></div>
                    <div class="popup-divider"></div>
                    <div class="popup-data" style="font-size:12px; font-weight:600; color:${getUnifiedHeatColor(hiVal)};">
                        當前體感狀態: ${getUnifiedFunnyText(hiVal)}
                    </div>
                    ${notesHTML}
                `, { offset: [0, -10], minWidth: 260 });
            }
        }

        window.addEventListener('DOMContentLoaded', initAndFetchWeather);
    </script>
